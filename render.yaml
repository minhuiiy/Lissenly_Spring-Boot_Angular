services:
  - type: web
    name: lissenly-backend
    runtime: java
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    autoDeploy: true

  - type: static
    name: lissenly-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist/frontend/browser
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: 20
